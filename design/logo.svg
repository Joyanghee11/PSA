<?xml version="1.0" encoding="UTF-8"?>
<!--
  DiveJournal — Editorial Wordmark (Mark-only, compact)
  Serif typography only, no icon. Reads as a masthead.
  Stacked two-line "DIVE / JOURNAL" in wide-tracked serif.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" width="160" height="48" role="img" aria-label="DiveJournal">
  <g font-family="'Fraunces', 'Noto Serif KR', Georgia, serif" fill="#0d1517" text-anchor="middle">
    <text x="80" y="22" font-size="18" font-weight="700" letter-spacing="6">DIVE</text>
    <line x1="28" y1="28" x2="132" y2="28" stroke="#dcd4c9" stroke-width="0.75"/>
    <text x="80" y="44" font-size="18" font-weight="400" letter-spacing="6" font-style="italic">journal</text>
  </g>
</svg>
