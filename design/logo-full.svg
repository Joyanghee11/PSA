<?xml version="1.0" encoding="UTF-8"?>
<!--
  DiveJournal — Editorial Masthead (Wide)
  For top-of-page masthead. Horizontal lockup with Korean subtitle.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 64" width="420" height="64" role="img" aria-label="다이브 저널 · DiveJournal">
  <g font-family="'Fraunces', 'Noto Serif KR', Georgia, serif" text-anchor="middle">
    <!-- wordmark -->
    <text x="210" y="30" font-size="26" font-weight="700" letter-spacing="10" fill="#0d1517">DIVE</text>
    <line x1="100" y1="37" x2="320" y2="37" stroke="#dcd4c9" stroke-width="0.75"/>
    <text x="210" y="54" font-size="26" font-weight="400" letter-spacing="10" font-style="italic" fill="#2d4a50">journal</text>
  </g>
  <!-- Korean subtitle, small caps-like letterspaced -->
  <g font-family="'Pretendard', 'Noto Sans KR', sans-serif" text-anchor="middle">
    <text x="210" y="12" font-size="9" letter-spacing="6" fill="#6b6e6a" font-weight="500">다 이 브   저 널</text>
  </g>
</svg>
