<?xml version="1.0" encoding="UTF-8"?>
<!--
  DiveJournal Full Lockup (horizontal)
  Mark + bilingual wordmark. Use this on the main header.
  Target height: ~40–56px on screen.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="320" height="56" role="img" aria-label="다이브저널 · DiveJournal">
  <!-- Mark -->
  <g>
    <rect width="48" height="48" y="4" rx="10" fill="#0e3a5f"/>
    <path d="M9 25 Q14.5 19.5 20 25 T31 25 L39 25"
          stroke="#a5c8de" stroke-width="2.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 34 Q14.5 28.5 20 34 T31 34 L39 34"
          stroke="#3a7ba4" stroke-width="2.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', Roboto, sans-serif" fill="#061a2c">
    <text x="62" y="28" font-size="22" font-weight="800" letter-spacing="-0.5">다이브저널</text>
    <text x="62" y="44" font-size="10" font-weight="600" letter-spacing="3" fill="#3a7ba4">DIVE JOURNAL</text>
  </g>
</svg>
